<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 310">
  <rect width="800" height="310" fill="#F4F8FF" rx="12"/>
  <text x="400" y="30" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="700" fill="#5B7390" letter-spacing="2">CRM PIPELINE — LEAD SOURCE ATTRIBUTION BY STAGE</text>

  <!-- Stage boxes with shrinking funnel shape via decreasing heights -->
  <!-- Stage 1: Lead -->
  <rect x="30" y="55" width="130" height="160" rx="8" fill="white" stroke="#DDE8F8" stroke-width="1.5"/>
  <rect x="31" y="56" width="128" height="30" rx="7" fill="#F1F5F9"/>
  <rect x="31" y="74" width="128" height="12" fill="#F1F5F9"/>
  <text x="95" y="74" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" font-weight="700" fill="#5B7390" letter-spacing="1">LEAD</text>
  <text x="95" y="108" text-anchor="middle" font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="34" font-weight="800" fill="#0F2137">100</text>
  <text x="95" y="128" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#5B7390">Total leads</text>
  <text x="95" y="148" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#5B7390">Outbound:</text>
  <text x="95" y="162" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#0D6EFD" font-weight="600">60 tagged ✓</text>
  <text x="95" y="178" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#5B7390">Inbound:</text>
  <text x="95" y="192" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#16A34A" font-weight="600">40 tagged ✓</text>

  <!-- Arrow -->
  <line x1="165" y1="135" x2="188" y2="135" stroke="#CBD5E1" stroke-width="2"/>
  <polygon points="188,129 200,135 188,141" fill="#CBD5E1"/>

  <!-- Stage 2: Meeting Booked -->
  <rect x="205" y="65" width="130" height="140" rx="8" fill="white" stroke="#BFDBFE" stroke-width="1.5"/>
  <rect x="206" y="66" width="128" height="30" rx="7" fill="#EFF6FF"/>
  <rect x="206" y="84" width="128" height="12" fill="#EFF6FF"/>
  <text x="270" y="84" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" font-weight="700" fill="#0D6EFD" letter-spacing="1">MTG BOOKED</text>
  <text x="270" y="118" text-anchor="middle" font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="34" font-weight="800" fill="#0D6EFD">55</text>
  <text x="270" y="138" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#5B7390">55% conversion</text>
  <text x="270" y="158" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#0D6EFD">Outbound: 30</text>
  <text x="270" y="174" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#16A34A">Inbound: 25</text>

  <!-- Arrow -->
  <line x1="340" y1="135" x2="363" y2="135" stroke="#CBD5E1" stroke-width="2"/>
  <polygon points="363,129 375,135 363,141" fill="#CBD5E1"/>

  <!-- Stage 3: Opportunity -->
  <rect x="378" y="75" width="130" height="120" rx="8" fill="white" stroke="#BFDBFE" stroke-width="1.5"/>
  <rect x="379" y="76" width="128" height="30" rx="7" fill="#EFF6FF"/>
  <rect x="379" y="94" width="128" height="12" fill="#EFF6FF"/>
  <text x="443" y="94" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" font-weight="700" fill="#0D6EFD" letter-spacing="1">OPPORTUNITY</text>
  <text x="443" y="126" text-anchor="middle" font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="34" font-weight="800" fill="#0D6EFD">28</text>
  <text x="443" y="146" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#5B7390">51% of meetings</text>
  <text x="443" y="164" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#0D6EFD">Outbound: 14</text>
  <text x="443" y="180" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#16A34A">Inbound: 14</text>

  <!-- Arrow -->
  <line x1="513" y1="135" x2="536" y2="135" stroke="#CBD5E1" stroke-width="2"/>
  <polygon points="536,129 548,135 536,141" fill="#CBD5E1"/>

  <!-- Stage 4: Closed Won -->
  <rect x="551" y="85" width="130" height="100" rx="8" fill="white" stroke="#86EFAC" stroke-width="1.5"/>
  <rect x="552" y="86" width="128" height="30" rx="7" fill="#DCFCE7"/>
  <rect x="552" y="104" width="128" height="12" fill="#DCFCE7"/>
  <text x="616" y="104" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" font-weight="700" fill="#16A34A" letter-spacing="1">CLOSED WON</text>
  <text x="616" y="134" text-anchor="middle" font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="34" font-weight="800" fill="#16A34A">11</text>
  <text x="616" y="154" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#5B7390">39% close rate</text>
  <text x="616" y="172" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#0D6EFD">Outbound: 5</text>
  <text x="616" y="186" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#16A34A">Inbound: 6</text>

  <!-- Key insight box -->
  <rect x="30" y="228" width="740" height="60" rx="8" fill="white" stroke="#FECACA" stroke-width="1"/>
  <text x="32" y="249" font-family="system-ui,-apple-system,sans-serif" font-size="10" font-weight="700" fill="#DC2626">⚠  If your CRM doesn't tag lead source at the opportunity level, all downstream metrics are unreliable.</text>
  <text x="32" y="265" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#5B7390">Outbound opportunities often take longer to close — blending them with inbound hides this. Segment every metric by source.</text>
  <text x="32" y="280" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#5B7390">Fix attribution before you fix the campaign. A working campaign looks broken if the data mislabels its results.</text>
</svg>
