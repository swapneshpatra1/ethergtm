<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 290">
  <rect width="800" height="290" fill="#F4F8FF" rx="12"/>
  <text x="400" y="28" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="700" fill="#5B7390" letter-spacing="2">4-TOUCH LINKEDIN OUTREACH SEQUENCE</text>

  <!-- Timeline line -->
  <line x1="60" y1="105" x2="740" y2="105" stroke="#DDE8F8" stroke-width="2"/>

  <!-- Touch 1 -->
  <circle cx="115" cy="105" r="22" fill="#0D6EFD" stroke="white" stroke-width="3"/>
  <text x="115" y="110" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="700" fill="white">Li</text>
  <rect x="65" y="45" width="100" height="50" rx="8" fill="white" stroke="#BFDBFE" stroke-width="1.5"/>
  <text x="115" y="62" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" font-weight="700" fill="#0D6EFD">Day 0</text>
  <text x="115" y="76" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#0F2137" font-weight="600">Blank Connect</text>
  <text x="115" y="89" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#5B7390">No message in request</text>
  <line x1="115" y1="95" x2="115" y2="105" stroke="#BFDBFE" stroke-width="1.5"/>

  <!-- Acceptance rate badge -->
  <rect x="65" y="138" width="100" height="30" rx="6" fill="#EFF6FF" stroke="#BFDBFE" stroke-width="1"/>
  <text x="115" y="152" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#5B7390">Acceptance rate:</text>
  <text x="115" y="164" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" font-weight="700" fill="#0D6EFD">55–68%</text>

  <!-- Touch 2 -->
  <circle cx="295" cy="105" r="22" fill="#0D6EFD" stroke="white" stroke-width="3"/>
  <text x="295" y="111" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="14" fill="white">💬</text>
  <rect x="245" y="45" width="100" height="50" rx="8" fill="white" stroke="#BFDBFE" stroke-width="1.5"/>
  <text x="295" y="62" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" font-weight="700" fill="#0D6EFD">Day 2–3</text>
  <text x="295" y="76" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#0F2137" font-weight="600">Genuine Comment</text>
  <text x="295" y="89" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#5B7390">On their post or company update</text>
  <line x1="295" y1="95" x2="295" y2="105" stroke="#BFDBFE" stroke-width="1.5"/>
  <rect x="245" y="138" width="100" height="30" rx="6" fill="#EFF6FF" stroke="#BFDBFE" stroke-width="1"/>
  <text x="295" y="152" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#5B7390">No ask. Build</text>
  <text x="295" y="164" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#5B7390">familiarity first.</text>

  <!-- Touch 3 -->
  <circle cx="475" cy="105" r="22" fill="#0891B2" stroke="white" stroke-width="3"/>
  <text x="475" y="111" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="14" fill="white">❓</text>
  <rect x="425" y="45" width="100" height="50" rx="8" fill="white" stroke="#A5F3FC" stroke-width="1.5"/>
  <text x="475" y="62" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" font-weight="700" fill="#0891B2">Day 4–5</text>
  <text x="475" y="76" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#0F2137" font-weight="600">Low-commit Question</text>
  <text x="475" y="89" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#5B7390">Tied to a real problem they face</text>
  <line x1="475" y1="95" x2="475" y2="105" stroke="#A5F3FC" stroke-width="1.5"/>
  <rect x="425" y="138" width="100" height="30" rx="6" fill="#F0FDFF" stroke="#A5F3FC" stroke-width="1"/>
  <text x="475" y="152" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#0891B2">Still no pitch.</text>
  <text x="475" y="164" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#5B7390">Earn the reply first.</text>

  <!-- Touch 4 -->
  <circle cx="670" cy="105" r="22" fill="#16A34A" stroke="white" stroke-width="3"/>
  <text x="670" y="111" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="14" fill="white">🎯</text>
  <rect x="615" y="45" width="110" height="50" rx="8" fill="white" stroke="#86EFAC" stroke-width="1.5"/>
  <text x="670" y="62" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" font-weight="700" fill="#16A34A">Day 7+</text>
  <text x="670" y="76" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#0F2137" font-weight="600">The Offer</text>
  <text x="670" y="89" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#5B7390">Framed around their answer</text>
  <line x1="670" y1="95" x2="670" y2="105" stroke="#86EFAC" stroke-width="1.5"/>
  <rect x="615" y="138" width="110" height="30" rx="6" fill="#DCFCE7" stroke="#86EFAC" stroke-width="1"/>
  <text x="670" y="152" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#16A34A">Converts at</text>
  <text x="670" y="164" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" font-weight="700" fill="#16A34A">2–4× higher rate</text>

  <!-- Bottom key insight -->
  <rect x="30" y="188" width="740" height="76" rx="8" fill="white" stroke="#DDE8F8" stroke-width="1"/>
  <text x="400" y="210" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" font-weight="700" fill="#0F2137">Why this works: context before the ask</text>
  <text x="400" y="228" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#5B7390">A prospect who's seen your name three times replies differently than one seeing it for the first time.</text>
  <text x="400" y="244" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#5B7390">This sequence stretches to 7–10 days instead of 3 — slower, but connection acceptance rates stay 55–68% vs ~30%</text>
  <text x="400" y="258" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#5B7390">for templated pitchy requests. Track acceptance rate and reply rate separately — they diagnose different problems.</text>
</svg>
