<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300">
  <rect width="800" height="300" fill="#F4F8FF" rx="12"/>
  <text x="400" y="28" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="700" fill="#5B7390" letter-spacing="2">INBOUND + OUTBOUND SHARE DATA — NOT BUDGET</text>

  <!-- Outbound circle area -->
  <circle cx="220" cy="150" r="100" fill="#EFF6FF" stroke="#BFDBFE" stroke-width="2"/>
  <text x="220" y="110" text-anchor="middle" font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="14" font-weight="800" fill="#0D6EFD">OUTBOUND</text>
  <text x="220" y="132" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#5B7390">Cold email sequences</text>
  <text x="220" y="147" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#5B7390">LinkedIn outreach</text>
  <text x="220" y="162" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#5B7390">ICP list building</text>
  <text x="220" y="180" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#5B7390">Direct pipeline creation</text>

  <!-- Inbound circle area -->
  <circle cx="580" cy="150" r="100" fill="#F0FDF4" stroke="#86EFAC" stroke-width="2"/>
  <text x="580" y="110" text-anchor="middle" font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="14" font-weight="800" fill="#16A34A">INBOUND</text>
  <text x="580" y="132" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#5B7390">Blog &amp; SEO content</text>
  <text x="580" y="147" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#5B7390">Landing pages</text>
  <text x="580" y="162" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#5B7390">Paid campaigns</text>
  <text x="580" y="180" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#5B7390">Word of mouth</text>

  <!-- Overlap / shared zone -->
  <text x="400" y="130" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#5B7390">SHARED</text>
  <text x="400" y="142" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#5B7390">INSIGHTS</text>

  <!-- Arrows left-to-right (outbound feeds inbound) -->
  <line x1="320" y1="140" x2="360" y2="140" stroke="#0D6EFD" stroke-width="2"/>
  <polygon points="360,134 374,140 360,146" fill="#0D6EFD"/>
  <!-- Arrow right-to-left (inbound feeds outbound) -->
  <line x1="360" y1="162" x2="320" y2="162" stroke="#16A34A" stroke-width="2"/>
  <polygon points="320,156 306,162 320,168" fill="#16A34A"/>

  <!-- Labels on arrows -->
  <text x="400" y="155" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#0D6EFD">objections → content</text>
  <text x="400" y="176" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#16A34A">keywords → targeting</text>

  <!-- Bottom examples -->
  <rect x="30" y="264" width="340" height="22" rx="6" fill="white" stroke="#BFDBFE" stroke-width="1"/>
  <text x="200" y="279" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#5B7390">15 prospects push back on the same objection →</text>
  <rect x="390" y="264" width="380" height="22" rx="6" fill="white" stroke="#86EFAC" stroke-width="1"/>
  <text x="580" y="279" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#16A34A" font-weight="600">That becomes your next blog post + landing page headline</text>
</svg>
