<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 320">
  <rect width="800" height="320" fill="#F4F8FF" rx="12"/>
  <text x="400" y="28" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="700" fill="#5B7390" letter-spacing="2">OUTBOUND REVENUE METRICS FUNNEL</text>

  <!-- Stage 1: Meetings Booked -->
  <rect x="30" y="50" width="720" height="50" rx="8" fill="#0D6EFD"/>
  <text x="90" y="81" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="white">Meetings Booked</text>
  <text x="650" y="73" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="rgba(255,255,255,0.75)">Track this by channel (email vs LinkedIn)</text>
  <text x="650" y="87" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="rgba(255,255,255,0.75)">— blending them hides the truth</text>
  <text x="756" y="78" text-anchor="end" font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="22" font-weight="800" fill="white">100%</text>

  <!-- Conversion rate 1 -->
  <line x1="400" y1="100" x2="400" y2="116" stroke="#CBD5E1" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="400" y="112" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#5B7390">↓ Target: 70%+ show rate</text>

  <!-- Stage 2: Shows -->
  <rect x="60" y="118" width="660" height="46" rx="8" fill="#2563EB"/>
  <text x="120" y="145" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="white">Show Rate</text>
  <text x="590" y="138" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="rgba(255,255,255,0.75)">Below 70%? Qualification upstream is too loose</text>
  <text x="590" y="152" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="rgba(255,255,255,0.75)">— too many wrong accounts getting meetings</text>
  <text x="712" y="146" text-anchor="end" font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="20" font-weight="800" fill="white">70%+</text>

  <!-- Conversion rate 2 -->
  <line x1="400" y1="164" x2="400" y2="180" stroke="#CBD5E1" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="400" y="176" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#5B7390">↓ Target: 40–60% meeting-to-opportunity</text>

  <!-- Stage 3: Opportunities -->
  <rect x="100" y="182" width="580" height="46" rx="8" fill="#1D4ED8"/>
  <text x="160" y="209" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="white">Meeting → Opportunity</text>
  <text x="550" y="202" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="rgba(255,255,255,0.75)">Defined next step required to count</text>
  <text x="550" y="216" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="rgba(255,255,255,0.75)">as a real opportunity</text>
  <text x="674" y="210" text-anchor="end" font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="20" font-weight="800" fill="white">40–60%</text>

  <!-- Conversion rate 3 -->
  <line x1="400" y1="228" x2="400" y2="244" stroke="#CBD5E1" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="400" y="240" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#5B7390">↓ Segment outbound vs inbound — they close at different rates</text>

  <!-- Stage 4: Closed Won -->
  <rect x="170" y="246" width="440" height="46" rx="8" fill="#16A34A"/>
  <text x="230" y="273" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="white">Closed Won</text>
  <text x="490" y="266" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="rgba(255,255,255,0.85)">Track $ pipeline value, not deal count</text>
  <text x="490" y="280" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="rgba(255,255,255,0.85)">Outbound often has longer cycle time</text>
  <text x="603" y="274" text-anchor="end" font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="20" font-weight="800" fill="white">20–35%</text>

  <!-- Note -->
  <text x="400" y="310" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#5B7390">Report all four numbers weekly — a deliverability issue unnoticed for a month can cost a quarter's pipeline.</text>
</svg>
