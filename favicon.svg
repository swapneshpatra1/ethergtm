<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="eg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1DCFFF"/>
      <stop offset="100%" stop-color="#1C7EFF"/>
    </linearGradient>
  </defs>
  <!-- Dark rounded background -->
  <rect width="32" height="32" rx="7" fill="#060E1B"/>
  <!-- Circular arc: lower-right → counterclockwise → upper-right (≈294° arc) -->
  <path d="M 25.2 22 A 11 11 0 1 0 25.2 10"
        fill="none" stroke="url(#eg)" stroke-width="3.2" stroke-linecap="round"/>
  <!-- Horizontal crossbar through centre -->
  <line x1="5" y1="16" x2="27" y2="16"
        stroke="url(#eg)" stroke-width="3.2" stroke-linecap="round"/>
</svg>
