<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="eg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1DCFFF"/>
      <stop offset="100%" stop-color="#1C7EFF"/>
    </linearGradient>
  </defs>
  <rect width="32" height="32" rx="7" fill="#060E1B"/>
  <!--
    Arc centre shifted to (17.5, 16) — compensates for the open-right gap
    pulling the visual weight leftward. r=9.5, ±25° gap, stroke=5.
  -->
  <g transform="translate(1.5, 0)">
    <path d="M 24.6 20 A 9.5 9.5 0 1 1 24.6 12"
          fill="none" stroke="url(#eg)" stroke-width="5" stroke-linecap="round"/>
    <line x1="6.5" y1="16" x2="25.5" y2="16"
          stroke="url(#eg)" stroke-width="5" stroke-linecap="round"/>
  </g>
</svg>
